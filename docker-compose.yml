services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: transform_qdrant
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage

  app:
    build: .
    container_name: transform_app
    env_file:
      - .env
    environment:
      # Локальный контейнер Qdrant. Если в .env заданы QDRANT_URL + QDRANT_API_KEY
      # (Qdrant Cloud) — они имеют приоритет, и эти значения игнорируются.
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s   # запас на ожидание Qdrant + первичный авто-сид (эмбеддинги)

volumes:
  qdrant_storage:
